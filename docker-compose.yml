services:
  db:
    image: mysql:8.0
    container_name: monitoring_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootdb
      MYSQL_DATABASE: monitoring_db
    ports:
      - "3306:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
  
  web:
    build: .
    container_name: monitoring_falsk
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootdb
      - DB_NAME=monitoring_db
      - TELEGRAM_TOKEN=8855115904:AAGjt5iBY5RUi5uQNq4D0u6lQgSXb00JVeA
      - TELEGRAM_CHAT_ID=6259125582
    depends_on:
      - db