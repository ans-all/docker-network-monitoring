<!DOCTYPE html>
<html>
<head>
    <title>Charts | Network Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Import Chart.js dari CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>Grafik Monitoring</h2>
    <a href="/" class="btn btn-sm mb-3 btn-info">Back</a>
    
    <div class="row">
        <!-- Grafik Uptime -->
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">Uptime per Host (%)</div>
                <div class="card-body">
                    <canvas id="uptimeChart"></canvas>
                </div>
            </div>
        </div>
        <!-- Grafik Latency -->
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">Rata-rata Latency per Host (ms)</div>
                <div class="card-body">
                    <canvas id="latencyChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Grafik Uptime
fetch('/api/uptime')
    .then(response => response.json())
    .then(data => {
        new Chart(document.getElementById('uptimeChart'), {
            type: 'bar',
            data: {
                labels: data.labels,
                datasets: [{
                    label: 'Uptime (%)',
                    data: data.data,
                    backgroundColor: 'rgba(75, 192, 192, 0.6)'
                }]
            },
            options: {
                scales: {
                    y: { min: 0, max: 100 }
                }
            }
        });
    });

// Grafik Latency
fetch('/api/latency')
    .then(response => response.json())
    .then(data => {
        new Chart(document.getElementById('latencyChart'), {
            type: 'bar',
            data: {
                labels: data.labels,
                datasets: [{
                    label: 'Avg Latency (ms)',
                    data: data.data,
                    backgroundColor: 'rgba(255, 159, 64, 0.6)'
                }]
            }
        });
    });
</script>
</body>
</html>
