<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDIT | Network Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">EDIT Host</h2>
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">Edit host</div>
            <div class="card-body">
                <form action="/update/{{ host.id }}" method="POST" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" name="hostname" class="form-control" value="{{host.hostname}}" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="ip_address" class="form-control" value="{{host.ip_address}}" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="port" class="form-control" value="{{host.port}}">
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="description" class="form-control" value="{{host.description}}">
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-success">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
