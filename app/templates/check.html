<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status | Network Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Hasil Cek Status</h2>
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">{{ host.hostname }}</div>
            <div class="card-body">
                <p>IP / Domain: {{ host.ip_address }}</p>
                <p>Status: {{ status }} </p>
                <p>Latency: {{ latency }}</p>
                <a href="/" class="btn btn-secondary">Kembali ke Daftar</a>
            </div>
        </div>
    </div>
</body>

</html>
